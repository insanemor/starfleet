# Manifesto mínimo do lab Starfleet (MVP).
# Copie para starfleet.yaml e ajuste o nome do cluster.
apiVersion: starfleet/v1
cluster:
  name: my-lab
  # Opcional — porta no host para a API Kubernetes (predefinido 6550).
  # kubeApiPort: 6550
  # Opcional — topologia k3d (predefinidos: servers 1, agents 0).
  # servers: 1
  # agents: 0
  # Opcional — limites de memória aceites pelo k3d (ex.: 512mb).
  # serversMemory: 512mb
  # agentsMemory: 256mb
